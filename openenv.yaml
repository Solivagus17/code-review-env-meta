name: CodeReviewEnv
version: "1.0.0"
description: >
  An OpenEnv environment simulating real-world code review tasks.
  An agent reviews Python pull requests, identifies bugs and security
  issues, provides feedback, and makes approval decisions.

author: "Solivagus17"

tags:
  - openenv
  - code-review
  - software-engineering
  - real-world
  - python

# ─────────────────────────────────────────────────────────────
# Tasks
# ─────────────────────────────────────────────────────────────
tasks:
  - name: easy
    description: Classify bugs by severity in short Python snippets
    difficulty: easy
    max_steps: 3
    reward_threshold: 0.5

  - name: medium
    description: Full code review with written feedback on a 50-line PR
    difficulty: medium
    max_steps: 5
    reward_threshold: 0.5

  - name: hard
    description: Identify and remediate security vulnerabilities in complex code
    difficulty: hard
    max_steps: 7
    reward_threshold: 0.5

# ─────────────────────────────────────────────────────────────
# Action Space
# ─────────────────────────────────────────────────────────────
action_space:
  type: object
  description: "Review action with verdict, comments, line annotations, and suggested fixes"
  fields:
    verdict:
      type: string
      enum: ["approve", "request_changes", "comment", "needs_more_info"]
      description: "Approval decision for the pull request"
    overall_comment:
      type: string
      description: "Overall review feedback (min 10 characters)"
    line_comments:
      type: array
      description: "Specific per-line annotations"
      items:
        type: object
        fields:
          line_number:
            type: integer
          comment:
            type: string
          severity:
            type: string
            enum: ["critical", "high", "medium", "low", "info"]
          category:
            type: string
            enum: ["bug", "security", "style", "performance", "logic"]
    suggested_fixes:
      type: array
      items: string
      description: "List of concrete fix suggestions"
    confidence_score:
      type: number
      description: "Agent confidence from 0.0 to 1.0"

# ─────────────────────────────────────────────────────────────
# Observation Space
# ─────────────────────────────────────────────────────────────
observation_space:
  type: object
  description: "Code diff, metadata, review history, task context"
  fields:
    task_id:
      type: string
      description: "Task difficulty: easy, medium, or hard"
    pr_id:
      type: string
      description: "Unique pull request identifier"
    pr_title:
      type: string
      description: "Title of the pull request"
    pr_description:
      type: string
      description: "Description of the changes"
    code_diff:
      type: string
      description: "The unified diff of code changes to review"
    step_number:
      type: integer
      description: "Current step number in the episode"
    max_steps:
      type: integer
      description: "Maximum steps allowed for this task"
    task_instructions:
      type: string
      description: "Specific instructions for the current review task"
    done:
      type: boolean
      description: "Whether the episode has ended"
    cumulative_reward:
      type: number
      description: "Accumulated reward for the episode so far"

# ─────────────────────────────────────────────────────────────
# Environment Properties
# ─────────────────────────────────────────────────────────────
reward_range: [0, 1]
max_steps: 7
episode_type: multi-step

# ─────────────────────────────────────────────────────────────
# Endpoints (OpenEnv spec)
# ─────────────────────────────────────────────────────────────
endpoints:
  reset:
    method: POST
    path: /reset
    description: "Start a new episode. Body: {task_id: easy|medium|hard}"
  step:
    method: POST
    path: /step
    description: "Submit a review action. Returns reward (float) and done flag."
  state:
    method: GET
    path: /state
    description: "Get current environment state."
  health:
    method: GET
    path: /health
    description: "Health check. Returns 200 OK when server is live."

api_version: "1.0"
license: MIT